name: audit-demo
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  security-events: write   # to upload SARIF to the Security tab
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run the audit action on sample code
        uses: ./                       # uses THIS repo's action.yml
        with:
          path: examples/sample_c
          cppcheck: 'true'
          upload-sarif: 'true'
